[pytest]
testpaths = research_environment_api/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require Docker for containers)

# -ra        : show extra summary for all non-passing tests
# --tb=short : compact tracebacks
addopts =
    -ra
    --tb=short

[coverage:run]
source = research_environment_api
omit =
    research_environment_api/wsgi.py
    research_environment_api/worker.py
    research_environment_api/tests/*
    **/__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
    \.\.\.
